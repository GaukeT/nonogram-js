<!DOCTYPE html><html lang="en">
  <head>
    <title>Nonogram</title>
    <script src="p5.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  </head>
  <body>
    <script src="game.js"></script>
    <script src="spot.js"></script>
    <script src="sketch.js"></script>
    <div class="game">
      <div class="header game">
        <h1>Nonogram</h1>
      </div>
      <div class="mode-buttons game">
        <button class="mode-btn active" onclick="setMode('fill')" id="btn-fill"><i class="fa fa-pencil"></i> Fill</button>
        <button class="mode-btn" onclick="setMode('mark')" id="btn-mark"><i class="fa fa-flag"></i> Mark</button>
      </div>
      <div class="size-buttons">
        <button class="size-btn" onclick="setGridSize(6)"  id="btn-size-6">6×6</button>
        <button class="size-btn" onclick="setGridSize(8)"  id="btn-size-8">8×8</button>
        <button class="size-btn active" onclick="setGridSize(10)" id="btn-size-10">10×10</button>
        <button class="size-btn" onclick="setGridSize(12)" id="btn-size-12">12×12</button>
        <button class="size-btn" onclick="setGridSize(15)" id="btn-size-15">15×15</button>
      </div>
      <div id="cnv-div"></div>
    </div>
  </body>
</html>
